<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRACE:// IP Locator</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" integrity="sha512-puBpdR0798OZvTTbP4A8Ix/l+A4dHDD0DGqYW6RQ+9jxkRFclaxxQb/SJAWZfWAkuyeQUytO7+7N4QKrDh+drA==" crossorigin="anonymous">
<style>
  :root{
    --bg: #0a0f14;
    --bg-grid: #0d141b;
    --panel: #111922;
    --panel-border: #1f2c38;
    --accent: #4fd1c5;
    --accent-dim: #2c6e68;
    --accent-2: #f6ad55;
    --text: #e6edf3;
    --muted: #7d8a99;
    --error: #f87171;
    --mono: ui-monospace, "SF Mono", "Cascadia Mono", "Roboto Mono", "Liberation Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, "Segoe UI", system-ui, "Hiragino Sans", "Yu Gothic", sans-serif;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100%;
  }

  body{
    background-image:
      linear-gradient(var(--bg-grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px);
    background-size: 40px 40px;
    background-position: -1px -1px;
  }

  a{ color: var(--accent); }

  .wrap{
    max-width: 1080px;
    margin: 0 auto;
    padding: 48px 24px 64px;
  }

  .eyebrow{
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .eyebrow::before{
    content: "";
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }

  .ip-display{
    font-family: var(--mono);
    font-weight: 600;
    font-size: clamp(2.2rem, 7vw, 4.4rem);
    line-height: 1.05;
    margin: 14px 0 6px;
    letter-spacing: -0.01em;
    word-break: break-all;
    min-height: 1.1em;
  }

  .cursor{
    display: inline-block;
    width: 0.55em;
    height: 0.78em;
    background: var(--accent);
    margin-left: 0.12em;
    vertical-align: -0.1em;
    animation: blink 1.1s steps(1) infinite;
  }

  @keyframes blink{
    0%, 49%{ opacity: 1; }
    50%, 100%{ opacity: 0; }
  }

  .status-line{
    font-family: var(--mono);
    font-size: 13px;
    color: var(--muted);
    min-height: 1.4em;
  }

  .status-line.is-error{ color: var(--error); }
  .status-line.is-ready{ color: var(--accent); }

  .grid{
    margin-top: 36px;
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 20px;
    align-items: stretch;
  }

  @media (max-width: 860px){
    .grid{ grid-template-columns: 1fr; }
  }

  .panel{
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 10px;
    overflow: hidden;
  }

  .panel-header{
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 14px 18px;
    border-bottom: 1px solid var(--panel-border);
  }

  dl.data-list{
    margin: 0;
    padding: 6px 18px 18px;
  }

  .data-row{
    display: flex;
    justify-content: space-between;
    gap: 12px;
    padding: 11px 0;
    border-bottom: 1px solid var(--panel-border);
  }

  .data-row:last-child{ border-bottom: none; }

  dt{
    font-size: 12.5px;
    color: var(--muted);
    margin: 0;
    flex-shrink: 0;
  }

  dd{
    font-family: var(--mono);
    font-size: 13.5px;
    margin: 0;
    text-align: right;
    color: var(--text);
    overflow-wrap: anywhere;
  }

  dd.placeholder{ color: var(--muted); }

  #map{
    width: 100%;
    height: 100%;
    min-height: 360px;
    background: #0d141b;
  }

  .map-empty{
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    min-height: 360px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 13px;
    text-align: center;
    padding: 24px;
  }

  .retry-btn{
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--bg);
    background: var(--accent);
    border: none;
    border-radius: 6px;
    padding: 8px 14px;
    margin-top: 14px;
    cursor: pointer;
  }

  .retry-btn:hover{ background: var(--accent-2); }
  .retry-btn:focus-visible, a:focus-visible{
    outline: 2px solid var(--accent-2);
    outline-offset: 2px;
  }

  .footnote{
    margin-top: 22px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
  }

  .sr-only{
    position: absolute;
    width: 1px; height: 1px;
    overflow: hidden;
    clip: rect(0 0 0 0);
  }

  /* Leaflet pulse marker */
  .pulse-marker{ position: relative; }
  .pulse-dot{
    position: absolute;
    left: 50%; top: 50%;
    width: 10px; height: 10px;
    margin: -5px 0 0 -5px;
    border-radius: 50%;
    background: var(--accent-2);
    box-shadow: 0 0 6px var(--accent-2);
  }
  .pulse-ring{
    position: absolute;
    left: 50%; top: 50%;
    width: 10px; height: 10px;
    margin: -5px 0 0 -5px;
    border-radius: 50%;
    background: var(--accent-2);
    opacity: 0.6;
    animation: pulse 1.8s ease-out infinite;
  }
  @keyframes pulse{
    0%{ transform: scale(1); opacity: 0.6; }
    100%{ transform: scale(4.2); opacity: 0; }
  }

  @media (prefers-reduced-motion: reduce){
    .cursor{ animation: none; opacity: 1; }
    .pulse-ring{ animation: none; opacity: 0; }
  }

  .leaflet-container{ background: #0d141b; font-family: var(--sans); }
</style>
</head>
<body>
<div class="wrap">

  <p class="eyebrow">TRACE:// YOUR CONNECTION</p>
  <div class="ip-display" id="ip-value" aria-live="polite">
    <span id="ip-text">&nbsp;</span><span class="cursor" aria-hidden="true"></span>
  </div>
  <p class="status-line" id="status" aria-live="polite">resolving location…</p>

  <div class="grid">
    <div class="panel">
      <div class="panel-header">Lookup result</div>
      <dl class="data-list" id="data-grid">
        <div class="data-row"><dt>City</dt><dd class="placeholder" data-field="city">—</dd></div>
        <div class="data-row"><dt>Region</dt><dd class="placeholder" data-field="region">—</dd></div>
        <div class="data-row"><dt>Country</dt><dd class="placeholder" data-field="country">—</dd></div>
        <div class="data-row"><dt>ISP / Network</dt><dd class="placeholder" data-field="isp">—</dd></div>
        <div class="data-row"><dt>Coordinates</dt><dd class="placeholder" data-field="coords">—</dd></div>
        <div class="data-row"><dt>Timezone</dt><dd class="placeholder" data-field="timezone">—</dd></div>
      </dl>
    </div>

    <div class="panel">
      <div id="map" role="img" aria-label="Map showing the approximate location of your IP address">
        <div class="map-empty" id="map-empty">map loading…</div>
      </div>
      <p id="map-sr-text" class="sr-only"></p>
    </div>
  </div>

  <p class="footnote">
    位置はIPアドレスをもとにした推定で、プロバイダの接続拠点を示すことが多く、実際の住所とは異なります。
    Geolocation by <a href="https://ipapi.co/" target="_blank" rel="noopener">ipapi.co</a> /
    <a href="https://ipwho.is/" target="_blank" rel="noopener">ipwho.is</a>,
    map tiles &copy; <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a> contributors.
  </p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js" integrity="sha512-BB3hKbKWOc9Ez/TAwyWxNXeoV9c1v6FIeYiBieIWkpLjauysF18NzgR1MBNBXf8/KABdlkX68nAhlwcDFLGPCQ==" crossorigin="anonymous"></script>
<script>
(function(){
  const ipTextEl   = document.getElementById('ip-text');
  const statusEl   = document.getElementById('status');
  const mapEmptyEl = document.getElementById('map-empty');
  const mapSrText  = document.getElementById('map-sr-text');
  const fields     = document.querySelectorAll('[data-field]');

  function setField(name, value){
    const el = document.querySelector('[data-field="' + name + '"]');
    if(!el) return;
    if(value === null || value === undefined || value === ''){
      el.textContent = '—';
      el.classList.add('placeholder');
    } else {
      el.textContent = value;
      el.classList.remove('placeholder');
    }
  }

  function setStatus(text, kind){
    statusEl.textContent = text;
    statusEl.classList.remove('is-error', 'is-ready');
    if(kind) statusEl.classList.add(kind);
  }

  function normalizeIpapi(d){
    return {
      ip: d.ip,
      city: d.city,
      region: d.region,
      country: d.country_name,
      isp: d.org,
      lat: d.latitude,
      lon: d.longitude,
      timezone: d.timezone
    };
  }

  function normalizeIpwhois(d){
    return {
      ip: d.ip,
      city: d.city,
      region: d.region,
      country: d.country,
      isp: (d.connection && (d.connection.isp || d.connection.org)) || null,
      lat: d.latitude,
      lon: d.longitude,
      timezone: d.timezone && d.timezone.id
    };
  }

  async function fetchIpInfo(){
    // Primary source
    try{
      const res = await fetch('https://ipapi.co/json/');
      if(!res.ok) throw new Error('ipapi.co request failed');
      const data = await res.json();
      if(data.error) throw new Error(data.reason || 'ipapi.co returned an error');
      return normalizeIpapi(data);
    }catch(primaryErr){
      // Fallback source
      const res2 = await fetch('https://ipwho.is/');
      if(!res2.ok) throw primaryErr;
      const data2 = await res2.json();
      if(data2.success === false) throw new Error(data2.message || 'ipwho.is returned an error');
      return normalizeIpwhois(data2);
    }
  }

  function renderData(info){
    ipTextEl.textContent = info.ip || '(unknown)';
    setField('city', info.city);
    setField('region', info.region);
    setField('country', info.country);
    setField('isp', info.isp);

    const hasCoords = typeof info.lat === 'number' && typeof info.lon === 'number';
    setField('coords', hasCoords ? info.lat.toFixed(4) + ', ' + info.lon.toFixed(4) : null);
    setField('timezone', info.timezone);

    if(hasCoords){
      setStatus('lookup complete', 'is-ready');
      initMap(info.lat, info.lon, info);
    } else {
      setStatus('lookup complete — no coordinates available', 'is-ready');
      mapEmptyEl.textContent = 'no coordinates available for this address';
    }
  }

  function initMap(lat, lon, info){
    mapEmptyEl.remove();

    const place = [info.city, info.region, info.country].filter(Boolean).join(', ') || 'Approximate location';
    mapSrText.textContent = place + ' (' + lat.toFixed(4) + ', ' + lon.toFixed(4) + ')';

    const map = L.map('map', { scrollWheelZoom: false }).setView([lat, lon], 11);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const pulseIcon = L.divIcon({
      className: 'pulse-marker',
      html: '<span class="pulse-ring" aria-hidden="true"></span><span class="pulse-dot" aria-hidden="true"></span>',
      iconSize: [10, 10]
    });

    L.marker([lat, lon], { icon: pulseIcon, title: place })
      .addTo(map)
      .bindPopup(place)
      .openPopup();

    map.on('focus', function(){ map.scrollWheelZoom.enable(); });
    map.on('blur', function(){ map.scrollWheelZoom.disable(); });
  }

  function renderError(err){
    setStatus('lookup failed — check your connection', 'is-error');
    mapEmptyEl.textContent = 'map unavailable';

    const retry = document.createElement('button');
    retry.type = 'button';
    retry.className = 'retry-btn';
    retry.textContent = 'retry lookup';
    retry.addEventListener('click', run);
    statusEl.insertAdjacentElement('afterend', retry);

    console.error('IP lookup error:', err);
  }

  function run(){
    document.querySelectorAll('.retry-btn').forEach(function(b){ b.remove(); });
    setStatus('resolving location…');
    fetchIpInfo().then(renderData).catch(renderError);
  }

  run();
})();
</script>
</body>
</html>
